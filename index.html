<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Stack - Debug Version</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6366f1; --glass: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; }
        
        /* Start Overlay - Fixes Autoplay block */
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .fullscreen-stack { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 1; }
        video { width: 100%; height: 33.333%; object-fit: cover; background: #111; border-bottom: 1px solid #222; }

        #remoteOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; grid-template-rows: 1fr 1fr 1fr; z-index: 60; background: #000; }
        .remote-zone { border: 1px solid #222; display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; }

        #gestureLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        #feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; background: rgba(220,38,38,0.8); padding: 12px 24px; border-radius: 50px; opacity: 0; transition: opacity 0.2s; z-index: 2000; pointer-events: none; }

        .floating-ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 20px; z-index: 150; }
        .floating-ui.hidden { opacity: 0; transform: translate(-50%, 40px); pointer-events: none; }

        input { width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: #fff; border-radius: 14px; box-sizing: border-box; margin-bottom: 10px; }
        .main-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: white; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h2>9:16 STACK READY</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Tap below to initialize video engine</p>
        <button class="main-btn" style="width: 200px;" onclick="unlockEngine()">START SYSTEM</button>
    </div>

    <div class="fullscreen-stack" id="playerView">
        <video id="v1" playsinline loop muted crossorigin="anonymous"></video>
        <video id="v2" playsinline loop muted crossorigin="anonymous"></video>
        <video id="v3" playsinline loop muted crossorigin="anonymous"></video>
    </div>

    <div id="remoteOverlay">
        <div class="remote-zone">ZONE 1</div><div class="remote-zone">ZONE 2</div><div class="remote-zone">ZONE 3</div>
    </div>

    <div id="gestureLayer"></div>
    <div id="feedback"></div>

    <div class="floating-ui hidden" id="dock">
        <div id="setupPart">
            <input type="text" id="passcode" placeholder="Enter Passcode (e.g. 777)">
            <div style="display:flex; gap:10px;">
                <button class="main-btn" onclick="initSync('player')">PLAYER</button>
                <button class="main-btn" onclick="initSync('remote')">REMOTE</button>
            </div>
            <div id="remoteInput" style="display:none;">
                <input type="url" id="linkIn" placeholder="Paste .mp4 link here">
                <button class="main-btn" onclick="triggerCmd('URL', document.getElementById('linkIn').value)">PUSH URL</button>
            </div>
        </div>
        <div id="controlPart" style="display:none;">
            <button class="main-btn" onclick="triggerCmd('PLAY')">PLAY / PAUSE</button>
            <p id="connStatus" style="font-size:10px; color:#10b981; text-align:center;">Standalone Mode</p>
        </div>
    </div>

    <script>
        const vids = [document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3')];
        const feedback = document.getElementById('feedback');
        const dock = document.getElementById('dock');
        let peer, conn, role, touchStartPos = {x:0, y:0};

        function unlockEngine() {
            // "Waking up" the videos
            vids.forEach(v => { v.play(); v.pause(); });
            document.getElementById('startOverlay').style.display = 'none';
            dock.classList.remove('hidden');
        }

        // Error catching for video
        vids.forEach((v, i) => {
            v.onerror = () => showError(`Video ${i+1} failed to load. Check link.`);
        });

        function showError(txt) {
            feedback.innerText = txt; feedback.style.opacity = "1";
            setTimeout(() => feedback.style.opacity = "0", 3000);
        }

        function initSync(selectedRole) {
            role = selectedRole;
            const code = document.getElementById('passcode').value.trim();
            if (!code) return alert("Enter passcode");

            peer = new Peer(role === 'player' ? code + "-p" : code + "-r");

            peer.on('open', () => {
                document.getElementById('connStatus').innerText = `READY: ${role.toUpperCase()}`;
                if (role === 'remote') {
                    document.getElementById('remoteOverlay').style.display = 'grid';
                    document.getElementById('playerView').style.display = 'none';
                    document.getElementById('remoteInput').style.display = 'block';
                    conn = peer.connect(code + "-p");
                    setupConn();
                }
                document.getElementById('controlPart').style.display = 'block';
            });

            peer.on('connection', c => { conn = c; setupConn(); });
            peer.on('error', () => showError("Connection failed. Resetting..."));
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('connStatus').innerText = "LINKED SUCCESS";
                showError("Linked!"); 
            });
            conn.on('data', data => { if (role === 'player') executeCommand(data); });
        }

        function triggerCmd(type, val = null) {
            if (conn && conn.open) conn.send({ type, val });
            else executeCommand({ type, val });
        }

        function executeCommand(cmd) {
            if (cmd.type === 'URL') {
                vids.forEach(v => { 
                    v.src = cmd.val; 
                    v.load();
                    v.play().catch(() => showError("Autoplay Blocked"));
                });
            }
            if (cmd.type === 'PLAY') vids.forEach(v => v.paused ? v.play() : v.pause());
            // Add other commands as needed...
        }

        // Gestures
        gestureLayer.addEventListener('touchstart', (e) => {
            touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        gestureLayer.addEventListener('touchend', (e) => {
            const touchEnd = e.changedTouches[0];
            const distY = touchEnd.clientY - touchStartPos.y;
            const section = Math.floor((touchStartPos.y / window.innerHeight) * 3);
            if (Math.abs(distY) < 10) triggerCmd('SOLO', section);
        });

    </script>
</body>
</html>
